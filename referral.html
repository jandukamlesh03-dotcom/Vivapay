<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Referral – VIVI PAY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabaseClient.js"></script>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 16px 40px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(145deg, #1a0e05, #2a1a0a);
            border-radius: 32px;
            padding: 24px 16px 28px;
            border: 2px solid #f5b342;
            box-shadow: 0 0 60px rgba(245, 179, 66, 0.2), inset 0 0 60px rgba(245, 179, 66, 0.05);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(245,179,66,0.03) 0%, transparent 70%);
            animation: glowPulse 6s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(245, 179, 66, 0.3);
            position: relative;
            z-index: 2;
        }
        .header .title {
            font-size: 28px;
            font-weight: 900;
            color: #f5b342;
            text-shadow: 0 0 30px rgba(245, 179, 66, 0.5);
            letter-spacing: 2px;
        }
        .header .back-btn {
            background: none; border: none;
            color: #a0b4c8;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }
        .header .back-btn:active { color: #f5b342; }

        .highlight-box {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 18px 16px;
            border: 1px solid rgba(245, 179, 66, 0.3);
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }
        .highlight-box .big {
            font-size: 42px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255,215,0,0.4);
            line-height: 1.2;
        }
        .highlight-box .sub {
            color: #d4a373;
            font-size: 16px;
            margin-top: 4px;
        }

        .referral-link-box {
            background: rgba(0,0,0,0.5);
            border-radius: 14px;
            padding: 12px 16px;
            border: 1px solid rgba(245, 179, 66, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }
        .referral-link-box .link {
            flex: 1;
            color: #a0b4c8;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .referral-link-box .copy-btn {
            background: #f5b342;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: 700;
            color: #0a1628;
            cursor: pointer;
            font-size: 14px;
        }
        .referral-link-box .copy-btn:active { background: #d49a2a; }

        .step-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }
        .step-item {
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(245, 179, 66, 0.1);
        }
        .step-item .step-icon { font-size: 28px; }
        .step-item .step-label {
            color: #a0b4c8;
            font-size: 12px;
            margin-top: 4px;
        }

        .benefits {
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(245, 179, 66, 0.1);
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }
        .benefits .item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #a0b4c8;
            font-size: 14px;
            padding: 4px 0;
        }
        .benefits .item .check {
            color: #58c4a0;
            font-weight: 700;
        }

        .btn-wood {
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, #f5b342, #d49a2a);
            border: none;
            border-radius: 40px;
            font-weight: 800;
            color: #0a1628;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(245, 179, 66, 0.3);
            transition: 0.2s;
            position: relative;
            z-index: 2;
        }
        .btn-wood:active { transform: scale(0.96); }

        .footer {
            text-align: center;
            color: #4a6a8a;
            font-size: 12px;
            margin-top: 20px;
            padding-top: 14px;
            border-top: 1px solid rgba(245, 179, 66, 0.1);
            position: relative;
            z-index: 2;
        }
        .footer a { color: #f5b342; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">👥 REFERRAL</div>
            <a href="dashboard.html" class="back-btn">← Back</a>
        </div>

        <div class="highlight-box">
            <div class="big">EARN 15%</div>
            <div class="sub">Commission on every deposit made by your referee</div>
        </div>

        <div class="referral-link-box">
            <span class="link" id="refLink">Loading...</span>
            <button class="copy-btn" id="copyRefLink">Copy</button>
        </div>

        <div class="step-grid">
            <div class="step-item">
                <div class="step-icon">📤</div>
                <div class="step-label">Share Link</div>
            </div>
            <div class="step-item">
                <div class="step-icon">📝</div>
                <div class="step-label">Friend Signs Up</div>
            </div>
            <div class="step-item">
                <div class="step-icon">💰</div>
                <div class="step-label">You Earn 15%</div>
            </div>
        </div>

        <div class="benefits">
            <div class="item"><span class="check">✅</span> Unlimited referrals</div>
            <div class="item"><span class="check">✅</span> Lifetime commission</div>
            <div class="item"><span class="check">✅</span> More friends = more earnings</div>
        </div>

        <button class="btn-wood" id="inviteBtn">📤 Invite Now</button>

        <div class="footer">
            VIVI PAY &bull; Refer & Earn
        </div>
    </div>

    <script>
        (function() {
            const linkEl = document.getElementById('refLink');
            const copyBtn = document.getElementById('copyRefLink');
            const inviteBtn = document.getElementById('inviteBtn');

            async function loadReferral() {
                try {
                    const { data: { user }, error } = await supabaseClient.auth.getUser();
                    if (error || !user) {
                        window.location.href = 'index.html';
                        return;
                    }
                    const userId = user.id.slice(0, 8);
                    const baseUrl = window.location.origin;
                    const refLink = baseUrl + '/index.html?ref=' + userId;
                    linkEl.textContent = refLink;

                    copyBtn.addEventListener('click', function() {
                        navigator.clipboard.writeText(refLink).then(() => {
                            alert('Referral link copied!');
                        }).catch(() => {
                            const ta = document.createElement('textarea');
                            ta.value = refLink;
                            document.body.appendChild(ta);
                            ta.select();
                            document.execCommand('copy');
                            ta.remove();
                            alert('Referral link copied!');
                        });
                    });

                    inviteBtn.addEventListener('click', function() {
                        if (navigator.share) {
                            navigator.share({
                                title: 'Join VIVI PAY and earn 15% commission!',
                                text: 'Use my referral link to sign up:',
                                url: refLink
                            }).catch(() => {});
                        } else {
                            copyBtn.click();
                        }
                    });

                } catch (err) {
                    console.error(err);
                }
            }

            loadReferral();
        })();
    </script>

</body>
</html>
