<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Referral – VIVI PAY</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="game-container" id="referralContainer">
        <!-- Header -->
        <div class="header">
            <div class="title">REFERRAL</div>
            <a href="#" class="back-btn" onclick="history.back()">← Back</a>
        </div>

        <!-- Main Highlight -->
        <div class="referral-highlight">
            <div class="big">EARN 15%</div>
            <div class="sub">On every deposit made by your referral</div>
        </div>

        <!-- 3 Steps -->
        <div class="step-grid">
            <div class="step-item">
                <div class="step-icon">📤</div>
                <div class="step-label">Share Link</div>
            </div>
            <div class="step-item">
                <div class="step-icon">📝</div>
                <div class="step-label">Friend Joins</div>
            </div>
            <div class="step-item">
                <div class="step-icon">💰</div>
                <div class="step-label">Friend Deposits</div>
            </div>
        </div>

        <!-- Commission Box -->
        <div class="commission-box">
            <div class="percent">15%</div>
            <div class="desc">Commission on Every Deposit</div>
        </div>

        <!-- Referral Link -->
        <div class="referral-link-box">
            <span class="link" id="refLink">Loading...</span>
            <button class="copy-btn" id="copyRefLink">Copy</button>
        </div>

        <!-- Benefits -->
        <div class="benefits">
            <div class="item"><span class="check">✅</span> Unlimited Referrals</div>
            <div class="item"><span class="check">✅</span> Lifetime Commission</div>
            <div class="item"><span class="check">✅</span> More Friends = More Earnings</div>
        </div>

        <!-- Invite Button -->
        <button class="btn-wood" id="inviteBtn">📤 Invite Now</button>

        <p style="text-align:center; color:#4a4a5a; font-size:12px; margin-top:12px;">
            No backend required – demo mode
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
