<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mystery Gift – VIVI PAY</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="game-container" id="mysteryContainer">
        <!-- Header -->
        <div class="header">
            <div class="title">MYSTERY GIFT</div>
            <a href="#" class="back-btn" onclick="history.back()">← Back</a>
        </div>

        <!-- Popup Content -->
        <div class="mystery-popup">
            <div class="popup-title">🎁 MYSTERY GIFT</div>
            <div class="popup-subtitle">Complete all tasks to unlock your special reward!</div>

            <!-- Task Row with Progress -->
            <div class="task-row">
                <!-- Progress line fill (controlled by JS) -->
                <div class="progress-line-fill" style="width: 0%;"></div>

                <!-- Task 1 -->
                <div class="task-box">
                    <div class="task-circle incomplete">1</div>
                    <div class="task-label incomplete">Task 1</div>
                </div>

                <!-- Node 1 -->
                <div class="task-node"></div>

                <!-- Task 2 -->
                <div class="task-box">
                    <div class="task-circle incomplete">2</div>
                    <div class="task-label incomplete">Task 2</div>
                </div>

                <!-- Node 2 -->
                <div class="task-node"></div>

                <!-- Task 3 -->
                <div class="task-box">
                    <div class="task-circle incomplete">3</div>
                    <div class="task-label incomplete">Task 3</div>
                </div>

                <!-- Node 3 -->
                <div class="task-node"></div>

                <!-- Task 4 -->
                <div class="task-box">
                    <div class="task-circle incomplete">4</div>
                    <div class="task-label incomplete">Task 4</div>
                </div>
            </div>

            <!-- Unlock Button -->
            <button class="btn-wood" id="unlockBtn" disabled>
                🔒 Complete all tasks to unlock
            </button>

            <p style="text-align:center; color:#4a4a5a; font-size:12px; margin-top:12px;">
                💡 Click on a task circle to mark it complete (demo mode)
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
