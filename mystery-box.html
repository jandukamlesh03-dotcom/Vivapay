<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mystery Gift – VIVI PAY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabaseClient.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fa; min-height: 100vh; display: flex; justify-content: center; padding: 20px 16px 40px; }
        .container {
            width: 100%; max-width: 480px; background: #fff; border-radius: 32px;
            padding: 24px 16px 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.06);
            border: 1px solid #e0e4e8;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid #e0e4e8; }
        .header .title { font-size: 26px; font-weight: 900; color: #1a2a4a; }
        .header .back-btn { background: none; border: none; color: #4a5a6a; font-size: 14px; cursor: pointer; text-decoration: none; }
        .header .back-btn:active { color: #c9a84c; }
        .info-box { background: #f5f7fa; border-radius: 16px; padding: 14px 16px; border: 1px solid #e0e4e8; margin-bottom: 20px; text-align: center; }
        .info-box .label { color: #4a5a6a; font-size: 13px; }
        .info-box .value { color: #1a2a4a; font-size: 24px; font-weight: 700; margin-top: 2px; }
        .popup-subtitle { text-align: center; color: #4a5a6a; font-size: 14px; margin-bottom: 24px; }

        .task-row { display: flex; justify-content: space-between; align-items: flex-start; position: relative; padding: 0 8px; margin-bottom: 24px; }
        .task-row::before { content: ''; position: absolute; top: 28px; left: 20px; right: 20px; height: 4px; background: #e0e4e8; border-radius: 4px; z-index: 0; }
        .progress-line-fill { position: absolute; top: 28px; left: 20px; height: 4px; background: #c9a84c; border-radius: 4px; z-index: 1; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 12px rgba(201,168,76,0.3); }
        .task-box { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; z-index: 2; flex: 1; }
        .task-box .task-circle { width: 44px; height: 44px; border-radius: 50%; background: #f5f7fa; border: 2px solid #e0e4e8; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #8a9aaa; transition: 0.4s; }
        .task-box .task-circle.completed { background: #c9a84c; border-color: #c9a84c; color: #fff; box-shadow: 0 0 20px rgba(201,168,76,0.3); transform: scale(1.05); }
        .task-box .task-circle.incomplete { background: #f5f7fa; border-color: #e0e4e8; color: #8a9aaa; opacity: 0.7; }
        .task-box .task-label { font-size: 10px; font-weight: 600; color: #4a5a6a; text-align: center; line-height: 1.3; }
        .task-box .task-label.completed { color: #c9a84c; }
        .task-box .task-deposit-btn { background: #1a2a4a; border: none; border-radius: 40px; padding: 2px 10px; font-size: 9px; font-weight: 700; color: #fff; cursor: pointer; transition: 0.3s; margin-top: 2px; }
        .task-box .task-deposit-btn:active { transform: scale(0.95); }
        .task-node { width: 10px; height: 10px; border-radius: 50%; background: #e0e4e8; position: relative; z-index: 2; flex-shrink: 0; margin-top: 20px; }
        .task-node.active { background: #c9a84c; box-shadow: 0 0 12px rgba(201,168,76,0.3); }

        .btn-wood { width: 100%; padding: 16px; background: #1a2a4a; border: none; border-radius: 40px; font-size: 18px; font-weight: 800; color: #fff; cursor: pointer; transition: 0.3s; margin-top: 16px; }
        .btn-wood:active { transform: scale(0.97); background: #0f1d3a; }
        .btn-wood:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { text-align: center; color: #8a9aaa; font-size: 12px; margin-top: 16px; padding-top: 12px; border-top: 1px solid #e0e4e8; }
        @media (max-width: 420px) { .task-box .task-circle { width: 38px; height: 38px; font-size: 14px; } .task-row::before { left: 16px; right: 16px; } .progress-line-fill { left: 16px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><div class="title">🎁 MYSTERY GIFT</div><a href="dashboard.html" class="back-btn">← Back</a></div>
        <div class="info-box"><div class="label">💰 Weekly Deposits</div><div class="value" id="weeklyDeposits">₹0.00</div><div style="font-size:12px; color:#8a9aaa;">Reset every Monday</div></div>
        <div class="popup-subtitle">Complete all tasks to unlock your special reward!</div>
        <div class="task-row">
            <div class="progress-line-fill" id="progressLineFill" style="width:0%;"></div>
            <!-- 5 tasks generated by JS -->
        </div>
        <button class="btn-wood" id="unlockBtn" disabled>🔒 Complete all tasks to unlock</button>
        <div class="footer">VIVI PAY &bull; Mystery Rewards</div>
    </div>
    <script>
        (function() {
            const BOXES = [
                { tier: 1, threshold: 500, name: 'Silver', icon: '🥈' },
                { tier: 2, threshold: 1000, name: 'Gold', icon: '🥇' },
                { tier: 3, threshold: 1500, name: 'Platinum', icon: '💎' },
                { tier: 4, threshold: 2000, name: 'Diamond', icon: '💠' },
                { tier: 5, threshold: 5000, name: 'Grand', icon: '👑' }
            ];
            let currentUser = null;
            const taskRow = document.querySelector('.task-row');

            async function loadStatus() {
                try {
                    const { data: { user }, error } = await supabaseClient.auth.getUser();
                    if (error || !user) { window.location.href = 'index.html'; return; }
                    currentUser = user;
                    const { data, error: rpcErr } = await supabaseClient.rpc('get_mystery_box_status', { p_user_id: user.id });
                    if (rpcErr) throw rpcErr;
                    const totalDeposits = parseFloat(data.total_deposits) || 0;
                    const tiers = data.tiers || [];
                    document.getElementById('weeklyDeposits').textContent = '₹' + totalDeposits.toFixed(2);
                    const progress = Math.min((totalDeposits / 5000) * 100, 100);
                    document.getElementById('progressLineFill').style.width = progress + '%';

                    // Build tasks
                    let html = '';
                    BOXES.forEach((box, idx) => {
                        const status = tiers[idx] || { milestone_reached: false, claimed: false };
                        const isClaimed = status.claimed;
                        const isReached = status.milestone_reached;
                        let circleClass = 'task-circle incomplete';
                        let labelClass = 'task-label incomplete';
                        let labelText = 'Task ' + (idx+1);
                        let btnText = 'Deposit ₹' + box.threshold;
                        let btnData = 'amount="' + box.threshold + '"';
                        if (isClaimed) {
                            circleClass = 'task-circle completed';
                            labelClass = 'task-label completed';
                            labelText = '✅ Claimed';
                            btnText = 'Claimed';
                            btnData = 'disabled';
                        } else if (isReached) {
                            circleClass = 'task-circle completed';
                            labelClass = 'task-label completed';
                            labelText = '🔓 Ready';
                            btnText = 'Claim';
                            btnData = 'data-claim="true" data-tier="' + box.tier + '"';
                        }
                        // Add node except after last
                        const nodeHtml = (idx < BOXES.length - 1) ? `<div class="task-node ${isClaimed || isReached ? 'active' : ''}"></div>` : '';
                        html += `
                            <div class="task-box" data-tier="${box.tier}">
                                <div class="${circleClass}">${idx+1}</div>
                                <div class="${labelClass}">${labelText}</div>
                                <div style="font-size:8px; color:#8a9aaa;">Deposit ₹${box.threshold}</div>
                                <button class="task-deposit-btn" ${btnData}>${btnText}</button>
                            </div>
                            ${nodeHtml}
                        `;
                    });
                    taskRow.innerHTML = html;

                    // Attach events for deposit and claim
                    document.querySelectorAll('.task-deposit-btn').forEach(btn => {
                        if (btn.hasAttribute('data-claim')) {
                            btn.addEventListener('click', async function(e) {
                                e.stopPropagation();
                                const tier = parseInt(this.dataset.tier);
                                await claimBox(tier, user.id);
                            });
                        } else if (btn.hasAttribute('data-amount')) {
                            btn.addEventListener('click', function(e) {
                                e.stopPropagation();
                                const amount = this.dataset.amount;
                                sessionStorage.setItem('prefill_deposit', amount);
                                window.location.href = 'dashboard.html#deposit';
                            });
                        }
                    });

                    // Update unlock button
                    const unlockBtn = document.getElementById('unlockBtn');
                    const allClaimed = tiers.every(t => t.claimed);
                    const anyReady = tiers.some(t => t.milestone_reached && !t.claimed);
                    if (allClaimed) { unlockBtn.disabled = true; unlockBtn.textContent = '🎉 All claimed this week!'; }
                    else if (anyReady) { unlockBtn.disabled = false; unlockBtn.textContent = '🎁 Claim Your Mystery Gift!'; unlockBtn.dataset.claimAll = 'true'; }
                    else { unlockBtn.disabled = true; unlockBtn.textContent = '🔒 Deposit to unlock next box'; }

                } catch (err) {
                    console.error(err);
                    alert('Failed to load mystery box status.');
                }
            }

            async function claimBox(tier, userId) {
                try {
                    const { data, error } = await supabaseClient.rpc('claim_mystery_box', { p_user_id: userId, p_tier: tier });
                    if (error) throw error;
                    if (!data.success) { alert(data.message); return; }
                    alert('🎉 ' + data.message);
                    loadStatus();
                } catch (err) { console.error(err); alert('Error claiming box.'); }
            }

            document.getElementById('unlockBtn').addEventListener('click', function() {
                if (this.dataset.claimAll === 'true') {
                    const firstClaim = document.querySelector('.task-deposit-btn[data-claim="true"]');
                    if (firstClaim) firstClaim.click();
                }
            });

            loadStatus();
        })();
    </script>
</body>
</html>
