<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VIVI PAY – Login</title>
    <!-- Supabase JS Client (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- Our Supabase client setup -->
    <script src="supabaseClient.js"></script>
    <style>
        /* --- same styles as in the previous version --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0e17; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .app-card { background: #131a2b; border-radius: 28px; padding: 32px 24px 28px; width: 100%; max-width: 400px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); border: 1px solid #1e2a3a; }
        .app-header { text-align: center; margin-bottom: 28px; }
        .app-header h1 { font-size: 28px; font-weight: 700; color: #ffffff; letter-spacing: 1px; }
        .app-header h1 span { color: #00d4aa; }
        .app-header p { color: #8a9bb5; font-size: 14px; margin-top: 4px; }
        .tab-bar { display: flex; background: #0e1625; border-radius: 40px; padding: 4px; margin-bottom: 28px; border: 1px solid #1e2a3a; }
        .tab-btn { flex: 1; border: none; background: transparent; color: #8a9bb5; font-size: 16px; font-weight: 600; padding: 10px 0; border-radius: 40px; cursor: pointer; transition: all 0.25s; }
        .tab-btn.active { background: #00d4aa; color: #0a0e17; box-shadow: 0 4px 14px rgba(0,212,170,0.25); }
        .tab-btn:active { transform: scale(0.96); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #b0c4de; margin-bottom: 5px; letter-spacing: 0.3px; }
        .form-group input { width: 100%; padding: 14px 16px; background: #0e1625; border: 1.5px solid #1e2a3a; border-radius: 14px; color: #ffffff; font-size: 15px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #00d4aa; }
        .form-group input::placeholder { color: #4a5a72; font-size: 14px; }
        .btn-primary { width: 100%; padding: 14px; background: #00d4aa; border: none; border-radius: 40px; color: #0a0e17; font-size: 17px; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 6px; letter-spacing: 0.5px; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.5; pointer-events: none; }
        .toggle-link { text-align: center; margin-top: 18px; color: #8a9bb5; font-size: 14px; }
        .toggle-link button { background: none; border: none; color: #00d4aa; font-weight: 700; font-size: 14px; cursor: pointer; padding: 0 4px; }
        .toggle-link button:active { opacity: 0.7; }
        .msg { text-align: center; font-size: 14px; padding: 8px 0; border-radius: 10px; margin-bottom: 12px; display: none; }
        .msg.error { display: block; color: #f87171; background: #1f0f12; border: 1px solid #4a1a22; }
        .msg.success { display: block; color: #6ee7b7; background: #0f1f18; border: 1px solid #1a3a2a; }
        .hidden { display: none !important; }
        @media (max-width: 420px) { .app-card { padding: 20px 16px; } }
    </style>
</head>
<body>
    <div id="app" class="app-card">
        <div class="app-header">
            <h1>VIVI <span>PAY</span></h1>
            <p>Secure · Fast · Reliable</p>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Register</button>
        </div>
        <div id="msgBox" class="msg"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required />
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
            <div class="toggle-link">
                Don't have an account? <button type="button" id="gotoRegister">Register</button>
            </div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Enter password" required />
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="regConfirm" placeholder="Confirm password" required />
            </div>
            <div class="form-group">
                <label>Inviter Code (optional)</label>
                <input type="text" id="regInvite" placeholder="Enter inviter code" />
            </div>
            <button type="submit" class="btn-primary" id="registerBtn">Register</button>
            <div class="toggle-link">
                Already have an account? <button type="button" id="gotoLogin">Go login</button>
            </div>
        </form>
    </div>

    <script>
        (function() {
            'use strict';

            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabBtns = document.querySelectorAll('.tab-btn');
            const msgBox = document.getElementById('msgBox');
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const regEmail = document.getElementById('regEmail');
            const regPassword = document.getElementById('regPassword');
            const regConfirm = document.getElementById('regConfirm');
            const regInvite = document.getElementById('regInvite');
            const gotoRegister = document.getElementById('gotoRegister');
            const gotoLogin = document.getElementById('gotoLogin');

            function showMsg(text, type) {
                msgBox.textContent = text;
                msgBox.className = 'msg ' + type;
                clearTimeout(msgBox._timer);
                msgBox._timer = setTimeout(() => { msgBox.className = 'msg'; }, 5000);
            }

            function setTab(tab) {
                tabBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
                loginForm.classList.toggle('hidden', tab !== 'login');
                registerForm.classList.toggle('hidden', tab !== 'register');
                msgBox.className = 'msg';
            }

            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() { setTab(this.dataset.tab); });
            });
            gotoRegister.addEventListener('click', () => setTab('register'));
            gotoLogin.addEventListener('click', () => setTab('login'));

            // Register
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = regEmail.value.trim();
                const password = regPassword.value;
                const confirm = regConfirm.value;
                const invite = regInvite.value.trim();

                if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
                if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

                const btn = document.getElementById('registerBtn');
                btn.disabled = true;
                btn.textContent = 'Signing up…';

                try {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: { data: { inviter_code: invite || null } }
                    });
                    if (error) throw error;

                    if (data.user) {
                        const userId = data.user.id;
                        // Create wallet if not exists
                        const { data: existing } = await supabaseClient
                            .from('wallets')
                            .select('id')
                            .eq('user_id', userId)
                            .maybeSingle();
                        if (!existing) {
                            await supabaseClient.from('wallets').insert({ user_id: userId, balance: 0 });
                        }
                        showMsg('Registration successful! Please log in.', 'success');
                        regEmail.value = '';
                        regPassword.value = '';
                        regConfirm.value = '';
                        regInvite.value = '';
                        setTab('login');
                    }
                } catch (err) {
                    console.error(err);
                    showMsg(err.message || 'Registration failed.', 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Register';
                }
            });

            // Login
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = loginEmail.value.trim();
                const password = loginPassword.value;

                if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }

                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.textContent = 'Logging in…';

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    if (error) throw error;
                    if (data.user) {
                        window.location.href = 'dashboard.html';
                    }
                } catch (err) {
                    console.error(err);
                    showMsg(err.message || 'Login failed. Check your credentials.', 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Log In';
                }
            });

            // Auto-redirect if already logged in
            (async function() {
                try {
                    const { data } = await supabaseClient.auth.getSession();
                    if (data.session) window.location.href = 'dashboard.html';
                } catch (_) {}
            })();
        })();
    </script>
</body>
</html>
