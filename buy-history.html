<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Buy History – VIVI PAY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabaseClient.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: #0a1628;
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #111d33;
            border-radius: 28px;
            padding: 24px 16px 20px;
            border: 1px solid #1a3a6b;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1a3a6b;
        }
        .header .logo { font-size: 22px; font-weight: 700; color: #ffffff; }
        .header .logo span { color: #f5b342; }
        .header .back-btn { background: none; border: none; color: #4a6a8a; font-size: 14px; cursor: pointer; text-decoration: none; }
        .header .back-btn:active { color: #f5b342; }
        .history-item {
            background: #0a1628;
            border-radius: 14px;
            padding: 12px 16px;
            border: 1px solid #1a3a6b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .history-item .left .amount { color: #ffffff; font-weight: 600; font-size: 16px; }
        .history-item .left .date { color: #4a6a8a; font-size: 12px; }
        .history-item .left .screenshot-link { color: #f5b342; font-size: 12px; text-decoration: none; }
        .status-pending {
            background: #1a2a3a; color: #f5b342; padding: 4px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; border: 1px solid #f5b342;
        }
        .status-accepted {
            background: #0f2a1f; color: #58c4a0; padding: 4px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; border: 1px solid #58c4a0;
        }
        .status-rejected {
            background: #2a1118; color: #f87171; padding: 4px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; border: 1px solid #f87171;
        }
        .empty-state { color: #4a6a8a; text-align: center; padding: 20px 0; font-size: 14px; }
        .footer { text-align: center; color: #4a6a8a; font-size: 12px; margin-top: 16px; padding-top: 12px; border-top: 1px solid #1a3a6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">BUY <span>HISTORY</span></div>
            <a href="dashboard.html" class="back-btn">← Back</a>
        </div>
        <div id="historyList"></div>
        <div class="footer">VIVI PAY &bull; Invest. Earn. Grow.</div>
    </div>
    <script>
        (function() {
            async function loadHistory() {
                const container = document.getElementById('historyList');
                try {
                    const { data: { user }, error } = await supabaseClient.auth.getUser();
                    if (error || !user) {
                        container.innerHTML = '<div class="empty-state">Please login to view history.</div>';
                        return;
                    }
                    const { data, error: dbError } = await supabaseClient
                        .from('deposit_requests')
                        .select('*')
                        .eq('user_id', user.id)
                        .order('created_at', { ascending: false });
                    if (dbError) throw dbError;
                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="empty-state">No buy history yet.</div>';
                        return;
                    }
                    let html = '';
                    data.forEach(req => {
                        const statusClass = 'status-' + (req.status || 'pending');
                        const date = new Date(req.created_at);
                        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const screenshotLink = req.proof_url ? `<a href="${req.proof_url}" target="_blank" class="screenshot-link">📎 View Screenshot</a>` : '';
                        html += `
                            <div class="history-item">
                                <div class="left">
                                    <div class="amount">₹ ${Number(req.amount).toFixed(2)}</div>
                                    <div class="date">${dateStr}</div>
                                    ${screenshotLink}
                                </div>
                                <span class="${statusClass}">${req.status || 'pending'}</span>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                } catch (err) {
                    console.error(err);
                    container.innerHTML = '<div class="empty-state">Error loading history</div>';
                }
            }
            loadHistory();
        })();
    </script>
</body>
</html>
