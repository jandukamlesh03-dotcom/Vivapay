<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f5b342"/>
      <stop offset="100%" stop-color="#d49a2a"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1d3a"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
  </defs>
  <!-- Shield background -->
  <rect x="5" y="5" width="490" height="140" rx="70" ry="70" fill="url(#navyGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
  <!-- Large "V" icon -->
  <text x="80" y="105" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="url(#goldGrad)" text-anchor="middle">V</text>
  <!-- "IVI" in white -->
  <text x="175" y="98" font-family="Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="2">IVI</text>
  <!-- "PAY" in gold -->
  <text x="335" y="98" font-family="Arial, sans-serif" font-size="64" font-weight="700" fill="url(#goldGrad)" letter-spacing="3">PAY</text>
  <!-- Tagline -->
  <text x="250" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#a0b4c8" text-anchor="middle" letter-spacing="4">INVEST · EARN · GROW</text>
  <!-- Decorative dots -->
  <circle cx="20" cy="20" r="3" fill="#c9a84c" opacity="0.5"/>
  <circle cx="480" cy="20" r="3" fill="#c9a84c" opacity="0.5"/>
  <circle cx="20" cy="130" r="3" fill="#c9a84c" opacity="0.5"/>
  <circle cx="480" cy="130" r="3" fill="#c9a84c" opacity="0.5"/>
</svg>
